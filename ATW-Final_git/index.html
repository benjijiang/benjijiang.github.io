<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ben Jiang's Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat&family=Gloria+Hallelujah&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
</head>
<body>
  <div id="loader">
    <canvas id="loader-canvas"></canvas>
  </div>
  <div id="stage">
    <div id="dialog-overlay">
      <h2 id="dialog-title"></h2>
      <p id="dialog-text"></p>
      <div id="dialog-preview-wrap">
        <iframe id="dialog-iframe" sandbox="allow-scripts allow-same-origin"></iframe>
        <div id="dialog-preview-click"></div>
      </div>
      <p id="dialog-hint">press any key to exit</p>
    </div>
    <div id="instruction-panel">
      <p class="instr-title">Art of the Web</p>
      <p class="instr-desc">A portfolio world</p>
      <ul>
        <li>A / ← or D / → to walk</li>
        <li>W / ↑ to interact with artwork</li>
        <li>Click the nav bar to teleport to a project</li>
      </ul>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
