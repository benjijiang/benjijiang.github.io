<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATW 01 - Art of the Web</title>
  <link rel="stylesheet" href="atw-01.css">
</head>
<body>
  <div class="artwork">
    <!-- 底层：白色大 O -->
    <span class="white-large-o">O</span>
    
    <!-- 第四层：白色大三角 -->
    <span class="white-large-triangle">▼</span>
    
    <!-- 第五层：白色小三角 -->
    <span class="white-small-triangle">▼</span>
    
    <!-- 第二层：左侧黑色 J -->
    <span class="black-j-left">J</span>
    
    <!-- 第三层：右侧黑色 J -->
    <span class="black-j-right">J</span>
    
    <!-- 顶层：黑色大 O（翻转） -->
    <span class="black-large-o">O</span>
  </div>
  
  <script src="atw-01.js"></script>
</body>
</html>
